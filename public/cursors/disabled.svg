<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EE5FF"/>
      <stop offset="1" stop-color="#B83AF3"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF3A60"/>
      <stop offset="1" stop-color="#FFB320"/>
    </linearGradient>
  </defs>

  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Shadow Offset -->
    <g transform="translate(1.5, 2.5)">
      <!-- Outline -->
      <circle cx="16" cy="16" r="10" fill="none" stroke="#22003B" stroke-width="6.5"/>
      <line x1="9.5" y1="9.5" x2="22.5" y2="22.5" stroke="#22003B" stroke-width="6.5"/>
      
      <!-- Fill -->
      <circle cx="16" cy="16" r="10" fill="none" stroke="url(#shadowGrad)" stroke-width="3.5"/>
      <line x1="10.5" y1="10.5" x2="21.5" y2="21.5" stroke="url(#shadowGrad)" stroke-width="3.5"/>
    </g>

    <!-- Main Base -->
    <g>
      <!-- Outline -->
      <circle cx="16" cy="16" r="10" fill="none" stroke="#22003B" stroke-width="6.5"/>
      <line x1="9.5" y1="9.5" x2="22.5" y2="22.5" stroke="#22003B" stroke-width="6.5"/>
      
      <!-- Fill -->
      <circle cx="16" cy="16" r="10" fill="none" stroke="url(#fillGrad)" stroke-width="3.5"/>
      <line x1="10.5" y1="10.5" x2="21.5" y2="21.5" stroke="url(#fillGrad)" stroke-width="3.5"/>
    </g>
  </g>
</svg>
